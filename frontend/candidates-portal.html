<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidates Portal | Hunters for HR Solutions</title>
<style>
:root{--navy:#1B2A4A;--gold:#C9A84C;--bg:#F4F5FA;--white:#fff;--muted:#6B7280;--border:rgba(0,0,0,0.06);}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--navy);min-height:100vh;}

/* ── Auth Screen ── */
#auth-screen{display:none;position:fixed;inset:0;background:var(--navy);z-index:9999;align-items:center;justify-content:center;}
#auth-screen.active{display:flex;}
.auth-card{background:var(--white);border-radius:20px;padding:40px 36px;width:420px;max-width:calc(100vw - 32px);box-shadow:0 24px 64px rgba(0,0,0,0.28);animation:slideUp 0.25s ease;}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-tabs{display:flex;border-radius:10px;overflow:hidden;border:1px solid #E5E7EB;margin-bottom:28px;}
.auth-tab{flex:1;padding:10px;background:none;border:none;font-size:13px;font-weight:500;cursor:pointer;color:#9CA3AF;transition:all 0.15s;}
.auth-tab.active{background:var(--navy);color:var(--white);}
.auth-field{margin-bottom:16px;}
.auth-field label{display:block;font-size:12px;font-weight:600;color:var(--navy);margin-bottom:6px;letter-spacing:0.02em;}
.auth-field input{width:100%;padding:11px 14px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:14px;color:var(--navy);outline:none;transition:border-color 0.15s;}
.auth-field input:focus{border-color:var(--navy);}
.auth-btn{width:100%;padding:13px;background:var(--navy);color:var(--white);border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity 0.15s;}
.auth-btn:hover{opacity:0.88;}
.auth-btn.gold{background:var(--gold);color:var(--navy);}
.auth-error{color:#A32D2D;font-size:12px;margin-top:8px;text-align:center;display:none;}
.auth-note{text-align:center;font-size:12px;color:var(--muted);margin-top:16px;}

.portal-header{background:var(--navy);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.portal-tabs{background:var(--white);border-bottom:0.5px solid #E5E7EB;display:flex;padding:0 32px;overflow-x:auto;}
.portal-tab{padding:12px 22px;font-size:13px;font-weight:500;border:none;background:none;cursor:pointer;color:#9CA3AF;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;}
.portal-tab.active{color:var(--navy);border-bottom-color:var(--gold);}
.portal-body{padding:24px 32px;max-width:1200px;margin:0 auto;}
.portal-section{display:none;}
.portal-section.active{display:block;}

.jobs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:1024px){.jobs-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.jobs-grid{grid-template-columns:1fr;}.portal-body{padding:16px;}}

.job-card{background:var(--white);border:0.5px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 2px 12px var(--border);cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;}
.job-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.1);}

.filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.filter-input{padding:9px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;color:var(--navy);outline:none;background:var(--white);}
.filter-input:focus{border-color:var(--navy);}

/* Overlay */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:999;overflow-y:auto;}
.overlay.active{display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;}
.overlay-panel{background:var(--white);border-radius:16px;width:960px;max-width:calc(100vw - 32px);animation:slideUp 0.2s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

#toast-container{position:fixed;top:20px;right:20px;z-index:99999;display:flex;flex-direction:column;gap:8px;}
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="hunters-logo-blue.jpeg" alt="Hunters" style="height:52px;width:auto;" onerror="this.outerHTML='<div style=color:#1B2A4A;font-size:22px;font-weight:700;letter-spacing:0.04em;>HUNTERS</div>'">
      <div style="color:#6B7280;font-size:13px;margin-top:8px;">Candidates Portal</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Create Account</button>
    </div>

    <!-- Login Form -->
    <div id="auth-login">
      <div class="auth-field"><label>Email Address</label><input type="email" id="login-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="auth-error" id="login-error"></div>
      <button class="auth-btn" onclick="doLogin()" id="login-btn">Sign In</button>
      <div class="auth-note">New here? <a href="#" onclick="switchAuthTab('register');return false;" style="color:#1B2A4A;font-weight:600;">Create a free account</a></div>
    </div>

    <!-- Register Form -->
    <div id="auth-register" style="display:none;">
      <div class="auth-field"><label>Full Name</label><input type="text" id="reg-name" placeholder="Ahmed Mohamed"></div>
      <div class="auth-field"><label>Email Address</label><input type="email" id="reg-email" placeholder="you@example.com"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="reg-password" placeholder="At least 6 characters" onkeydown="if(event.key==='Enter')doRegister()"></div>
      <div class="auth-error" id="reg-error"></div>
      <button class="auth-btn gold" onclick="doRegister()" id="reg-btn">Create Account & Continue</button>
      <div class="auth-note">Already have an account? <a href="#" onclick="switchAuthTab('login');return false;" style="color:#1B2A4A;font-weight:600;">Sign in</a></div>
    </div>
  </div>
</div>

<!-- Header -->
<div class="portal-header" id="portal-header" style="display:none;">
  <img src="hunters-logo-white.jpeg" alt="Hunters" style="height:38px;width:auto;" onerror="this.outerHTML='<span style=color:#C9A84C;font-size:15px;font-weight:500;>HUNTERS</span>'">
  <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
    <span style="color:rgba(255,255,255,0.7);font-size:12px;" id="portal-username"></span>
    <button onclick="showPortalSection('profile')" style="color:rgba(255,255,255,0.7);background:none;border:none;font-size:12px;cursor:pointer;">My Profile</button>
    <button onclick="showPortalSection('cv-writer')" style="background:#C9A84C;color:#1B2A4A;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:500;cursor:pointer;">✨ AI CV Writer</button>
    <button onclick="goBack()" style="color:rgba(255,255,255,0.55);background:none;border:0.5px solid rgba(255,255,255,0.2);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;">← Dashboard</button>
  </div>
</div>

<!-- Tabs -->
<div class="portal-tabs" id="portal-tabs" style="display:none;">
  <button class="portal-tab active" onclick="showPortalSection('all-jobs')">All Jobs</button>
  <button class="portal-tab" onclick="showPortalSection('edu-jobs')">Education Jobs</button>
  <button class="portal-tab" onclick="showPortalSection('corp-jobs')">Corporate Jobs</button>
  <button class="portal-tab" onclick="showPortalSection('my-applications')">My Applications</button>
  <button class="portal-tab" onclick="showPortalSection('profile')">My Profile</button>
</div>

<!-- Body -->
<div class="portal-body" id="portal-body" style="display:none;">

  <!-- All Jobs -->
  <div id="section-all-jobs" class="portal-section active">
    <div class="filter-bar">
      <input type="text" id="q-all" class="filter-input" style="flex:1;min-width:180px;" placeholder="Search jobs by title, company, location…" oninput="renderSection('all-jobs')">
      <select id="loc-all" class="filter-input" onchange="renderSection('all-jobs')"><option value="">All Locations</option></select>
      <select id="type-all" class="filter-input" onchange="renderSection('all-jobs')">
        <option value="">All Types</option><option>Full-time</option><option>Part-time</option><option>Contract</option>
      </select>
    </div>
    <div id="grid-all-jobs" class="jobs-grid">
      <div class="job-card"><div class="skeleton" style="height:18px;width:55%;margin-bottom:10px;"></div><div class="skeleton" style="height:14px;width:75%;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:45%;"></div></div>
      <div class="job-card"><div class="skeleton" style="height:18px;width:55%;margin-bottom:10px;"></div><div class="skeleton" style="height:14px;width:75%;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:45%;"></div></div>
      <div class="job-card"><div class="skeleton" style="height:18px;width:55%;margin-bottom:10px;"></div><div class="skeleton" style="height:14px;width:75%;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;width:45%;"></div></div>
    </div>
  </div>

  <!-- Education Jobs -->
  <div id="section-edu-jobs" class="portal-section">
    <div class="filter-bar">
      <input type="text" id="q-edu" class="filter-input" style="flex:1;" placeholder="Search education jobs…" oninput="renderSection('edu-jobs')">
    </div>
    <div id="grid-edu-jobs" class="jobs-grid"></div>
  </div>

  <!-- Corporate Jobs -->
  <div id="section-corp-jobs" class="portal-section">
    <div class="filter-bar">
      <input type="text" id="q-corp" class="filter-input" style="flex:1;" placeholder="Search corporate jobs…" oninput="renderSection('corp-jobs')">
    </div>
    <div id="grid-corp-jobs" class="jobs-grid"></div>
  </div>

  <!-- My Applications -->
  <div id="section-my-applications" class="portal-section">
    <div id="apps-content"></div>
  </div>

  <!-- Profile -->
  <div id="section-profile" class="portal-section">
    <div id="profile-content"></div>
  </div>

  <!-- AI CV Writer -->
  <div id="section-cv-writer" class="portal-section">
    <div id="cv-writer-content"></div>
  </div>

</div>

<!-- Job Detail + Apply Overlay -->
<div id="job-overlay" class="overlay" onclick="if(event.target===this)closeOverlay()">
  <div class="overlay-panel">
    <div id="overlay-inner"></div>
  </div>
</div>

<div id="toast-container"></div>

<script>
/* ─── Base URL (works locally + on Railway) ─── */
var API_BASE=(function(){
  if(window.location.protocol==='file:'){
    /* Opened as a local file — API calls won't work.
       Show a banner and fallback to empty (will still fail gracefully). */
    document.addEventListener('DOMContentLoaded',function(){
      var b=document.createElement('div');
      b.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:#A32D2D;color:#fff;font-size:13px;text-align:center;padding:10px 16px;';
      b.innerHTML='⚠️ Open this page from your <strong>live Railway URL</strong>, not as a local file. Local file mode cannot connect to the API.';
      document.body.prepend(b);
    });
    return '';
  }
  return '';
})();

/* ─── Utilities ─── */
function showToast(msg,type){
  var c={success:{bg:'#E1F5EE',tx:'#0F6E56',br:'#9FE1CB'},error:{bg:'#FCEBEB',tx:'#A32D2D',br:'#F5B8B8'},info:{bg:'#E6F1FB',tx:'#185FA5',br:'#B5D4F4'}}[type]||{bg:'#E6F1FB',tx:'#185FA5',br:'#B5D4F4'};
  var t=document.createElement('div');
  t.style.cssText='background:'+c.bg+';color:'+c.tx+';border:0.5px solid '+c.br+';border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,0.12);max-width:320px;';
  t.textContent=msg;document.getElementById('toast-container').appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(function(){t.remove();},300);},3000);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ini(n){return String(n||'').split(/\s+/).filter(Boolean).slice(0,2).map(function(w){return w[0];}).join('').toUpperCase()||'?';}
function fixScore(r){if(r===null||r===undefined)return null;var n=Number(r);if(isNaN(n))return null;if(n<=1)return Math.round(n*100);if(n<=10)return Math.round(n*10);return Math.round(Math.min(100,n));}
function scoreStyle(pct){if(pct===null)return{bg:'#F5F6F8',tx:'#6B7280'};if(pct>=75)return{bg:'#E1F5EE',tx:'#0F6E56'};if(pct>=50)return{bg:'#FAEEDA',tx:'#854F0B'};return{bg:'#FCEBEB',tx:'#A32D2D'};}
function daysAgo(d){if(!d)return'';var days=Math.floor((Date.now()-new Date(d))/ 86400000);return days===0?'Today':days===1?'Yesterday':days+' days ago';}
function tok(){return localStorage.getItem('token')||'';}
function hdrs(){return{'Authorization':'Bearer '+tok()};}

/* ─── Auth ─── */
var portalUser=null,allJobs=[],_applyFile=null,currentJob=null,_cvData=null;
var _profileSkills=[],_profileExps=[];

function showAuthScreen(){
  document.getElementById('auth-screen').classList.add('active');
  document.getElementById('portal-header').style.display='none';
  document.getElementById('portal-tabs').style.display='none';
  document.getElementById('portal-body').style.display='none';
}
function hideAuthScreen(){
  document.getElementById('auth-screen').classList.remove('active');
  document.getElementById('portal-header').style.display='';
  document.getElementById('portal-tabs').style.display='';
  document.getElementById('portal-body').style.display='';
}

function switchAuthTab(tab){
  document.getElementById('auth-login').style.display=tab==='login'?'':'none';
  document.getElementById('auth-register').style.display=tab==='register'?'':'none';
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
  document.getElementById('login-error').style.display='none';
  document.getElementById('reg-error').style.display='none';
}

function doLogin(){
  var email=(document.getElementById('login-email').value||'').trim();
  var pass=(document.getElementById('login-password').value||'');
  var errEl=document.getElementById('login-error');
  var btn=document.getElementById('login-btn');
  if(!email||!pass){errEl.textContent='Please enter email and password.';errEl.style.display='block';return;}
  btn.textContent='Signing in…';btn.disabled=true;
  var fd=new URLSearchParams();fd.append('username',email);fd.append('password',pass);
  fetch(API_BASE+'/auth/login',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:fd})
    .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});})
    .then(function(res){
      btn.textContent='Sign In';btn.disabled=false;
      if(!res.ok){errEl.textContent=res.d.detail||'Incorrect email or password.';errEl.style.display='block';return;}
      localStorage.setItem('token',res.d.access_token);
      onAuthSuccess(res.d.access_token);
    })
    .catch(function(){btn.textContent='Sign In';btn.disabled=false;errEl.textContent='Connection error. Open this page from your Railway URL, not as a local file.';errEl.style.display='block';});
}

function doRegister(){
  var name=(document.getElementById('reg-name').value||'').trim();
  var email=(document.getElementById('reg-email').value||'').trim();
  var pass=(document.getElementById('reg-password').value||'');
  var errEl=document.getElementById('reg-error');
  var btn=document.getElementById('reg-btn');
  if(!name||!email||!pass){errEl.textContent='All fields are required.';errEl.style.display='block';return;}
  if(pass.length<6){errEl.textContent='Password must be at least 6 characters.';errEl.style.display='block';return;}
  btn.textContent='Creating account…';btn.disabled=true;
  fetch(API_BASE+'/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({full_name:name,email:email,password:pass})})
    .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d};});})
    .then(function(res){
      if(!res.ok){btn.textContent='Create Account & Continue';btn.disabled=false;errEl.textContent=res.d.detail||'Registration failed.';errEl.style.display='block';return;}
      /* auto-login after register */
      var fd=new URLSearchParams();fd.append('username',email);fd.append('password',pass);
      return fetch(API_BASE+'/auth/login',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:fd})
        .then(function(r2){return r2.json();})
        .then(function(d2){
          btn.textContent='Create Account & Continue';btn.disabled=false;
          if(!d2.access_token){errEl.textContent='Registered! Please sign in.';errEl.style.display='block';switchAuthTab('login');return;}
          localStorage.setItem('token',d2.access_token);
          onAuthSuccess(d2.access_token);
        });
    })
    .catch(function(){btn.textContent='Create Account & Continue';btn.disabled=false;errEl.textContent='Connection error. Open this page from your Railway URL, not as a local file.';errEl.style.display='block';});
}

function onAuthSuccess(token){
  fetch(API_BASE+'/auth/me',{headers:{'Authorization':'Bearer '+token}})
    .then(function(r){return r.json();})
    .then(function(u){
      portalUser=u;
      var el=document.getElementById('portal-username');if(el)el.textContent=u.full_name||u.email;
      hideAuthScreen();
      loadJobs();
    });
}

function checkAuth(){
  var t=localStorage.getItem('token');
  if(!t){showAuthScreen();return;}
  fetch(API_BASE+'/auth/me',{headers:{'Authorization':'Bearer '+t}})
    .then(function(r){if(!r.ok){showAuthScreen();return null;}return r.json();})
    .then(function(u){
      if(!u){showAuthScreen();return;}
      portalUser=u;
      var el=document.getElementById('portal-username');if(el)el.textContent=u.full_name||u.email;
      hideAuthScreen();
      loadJobs();
    })
    .catch(function(){showAuthScreen();});
}

function goBack(){
  var t=tok();if(!t){showAuthScreen();return;}
  fetch('/auth/me',{headers:{'Authorization':'Bearer '+t}}).then(function(r){return r.json();})
    .then(function(u){window.location.href=u&&u.is_admin?'index.html':'company-dashboard.html';})
    .catch(function(){window.location.href='index.html';});
}

/* ─── Navigation ─── */
var tabOrder=['all-jobs','edu-jobs','corp-jobs','my-applications','profile','cv-writer'];
function showPortalSection(id){
  document.querySelectorAll('.portal-section').forEach(function(s){s.style.display='none';s.classList.remove('active');});
  var el=document.getElementById('section-'+id);if(el){el.style.display='block';el.classList.add('active');}
  document.querySelectorAll('.portal-tab').forEach(function(t,i){t.classList.toggle('active',tabOrder[i]===id);});
  if(id==='my-applications')renderMyApps();
  if(id==='profile')renderProfile();
  if(id==='cv-writer')renderCVWriter();
  if(['all-jobs','edu-jobs','corp-jobs'].includes(id))renderSection(id);
}

/* ─── Jobs ─── */
var EDU=['school','university','training','education','academy','college','kindergarten','institute','learning'];
function isEdu(j){var c=(j.company_name||'').toLowerCase(),t=(j.job_title||'').toLowerCase();return EDU.some(function(k){return c.includes(k)||t.includes(k);});}

async function loadJobs(){
  try{
    var r=await fetch('/public/jobs');allJobs=await r.json();
    if(!Array.isArray(allJobs))allJobs=[];
    var locs=[...new Set(allJobs.map(function(j){return j.job_location;}).filter(Boolean))];
    var sel=document.getElementById('loc-all');
    if(sel)sel.innerHTML='<option value="">All Locations</option>'+locs.map(function(l){return'<option>'+esc(l)+'</option>';}).join('');
    renderSection('all-jobs');
  }catch(e){allJobs=[];document.getElementById('grid-all-jobs').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#9CA3AF;">Could not load jobs</div>';}
}

function renderSection(sid){
  var gridId='grid-'+sid;
  var grid=document.getElementById(gridId);if(!grid)return;
  var q=(document.getElementById('q-'+sid.split('-')[0])||{}).value||'';q=q.toLowerCase();
  var loc=sid==='all-jobs'?(document.getElementById('loc-all')||{}).value||'':'';
  var typ=sid==='all-jobs'?(document.getElementById('type-all')||{}).value||'':'';

  var list=allJobs.filter(function(j){
    if(sid==='edu-jobs'&&!isEdu(j))return false;
    if(sid==='corp-jobs'&&isEdu(j))return false;
    if(q&&!((j.job_title||'').toLowerCase().includes(q)||(j.company_name||'').toLowerCase().includes(q)||(j.job_location||'').toLowerCase().includes(q)))return false;
    if(loc&&j.job_location!==loc)return false;
    if(typ&&!((j.education_level||'').includes(typ)||(j.employment_type||'').includes(typ)))return false;
    return true;
  });

  if(!list.length){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:48px;"><div style="font-size:14px;font-weight:500;color:#1B2A4A;margin-bottom:6px;">No jobs found</div><div style="font-size:12px;color:#9CA3AF;">Try adjusting filters</div></div>';
    return;
  }

  grid.innerHTML=list.map(function(j){
    var ci=ini(j.company_name||'C');
    var sal=j.salary_range&&!j.hide_salary?j.salary_range:'Competitive salary';
    var emp=j.education_level||j.employment_type||'';
    var posted=daysAgo(j.created_at);
    var eduBadge=isEdu(j)?'<span style="font-size:10px;background:#E6F1FB;color:#185FA5;padding:2px 7px;border-radius:10px;margin-left:6px;">Education</span>':'';
    return '<div class="job-card" onclick="openJob('+j.id+')">' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">' +
        '<div style="width:40px;height:40px;border-radius:50%;background:#1B2A4A;color:#C9A84C;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;">'+esc(ci)+'</div>' +

function tagHtml(str,bg,tx){
  if(!str)return'';
  return str.split(/[,;]+/).filter(Boolean).map(function(s){s=s.trim();return s?'<span style="display:inline-flex;padding:4px 10px;background:'+bg+';color:'+tx+';border-radius:20px;font-size:11px;font-weight:500;margin:3px 3px 0 0;">'+esc(s)+'</span>':''}).join('');
}

function applyPanelHtml(){
  return '<div style="font-size:15px;font-weight:500;color:#1B2A4A;margin-bottom:16px;">Apply for this Position</div>' +

        '<div style="font-size:13px;font-weight:500;color:#1B2A4A;margin-bottom:4px;">Drop CV here or click to browse</div>' +

        '<div id="file-chosen" style="margin-top:10px;font-size:12px;color:#0F6E56;font-weight:500;display:none;"></div>' +
      '</div>' +
      '<input type="file" id="cv-file-input" accept=".pdf,.docx" style="display:none;" onchange="onFileChosen(this.files)">' +
      '<button id="apply-btn" onclick="submitApply()" disabled ' +
        'style="width:100%;background:#1B2A4A;color:#fff;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:500;cursor:not-allowed;margin-top:14px;opacity:0.5;">' +
        '🚀 Screen with AI' +

      '<div style="font-size:11px;color:#9CA3AF;text-align:center;margin-top:8px;">Instant AI scoring · 5-10 seconds</div>' +

}

function handleDrop(e){e.preventDefault();document.getElementById('apply-dropzone').style.borderColor='#E5E7EB';if(e.dataTransfer.files.length)onFileChosen(e.dataTransfer.files);}

function onFileChosen(files){
  if(!files||!files.length)return;
  var f=files[0],ext=f.name.split('.').pop().toLowerCase();
  if(ext!=='pdf'&&ext!=='docx'){showToast('Only PDF or DOCX files','error');return;}
  _applyFile=f;
  var n=document.getElementById('file-chosen');if(n){n.textContent='✓ '+f.name;n.style.display='block';}
  var b=document.getElementById('apply-btn');if(b){b.disabled=false;b.style.opacity='1';b.style.cursor='pointer';}
}

async function submitApply(){
  if(!_applyFile||!currentJob)return;
  var form=document.getElementById('apply-form');
  form.innerHTML='<div style="text-align:center;padding:24px;">' +
    '<div id="p-step" style="font-size:13px;color:#6B7280;margin-bottom:14px;">Uploading CV…</div>' +
    '<div style="height:4px;background:#F0F1F5;border-radius:2px;overflow:hidden;"><div id="p-bar" style="height:100%;width:8%;background:#C9A84C;border-radius:2px;transition:width 0.5s;"></div></div>' +
  '</div>';
  var steps=['Uploading CV…','AI is screening your profile…','Generating results…'],si=0;
  var iv=setInterval(function(){si=Math.min(si+1,steps.length-1);var s=document.getElementById('p-step'),b=document.getElementById('p-bar');if(s)s.textContent=steps[si];if(b)b.style.width=((si+1)/steps.length*80)+'%';},1600);
  try{
    var fd=new FormData();fd.append('file',_applyFile);fd.append('job_id',String(currentJob.id));
    var res=await fetch('/candidates/screen-cv',{method:'POST',headers:hdrs(),body:fd});
    clearInterval(iv);var pb=document.getElementById('p-bar');if(pb)pb.style.width='100%';
    if(!res.ok){var e=await res.json();throw new Error(e.detail||'Screening failed');}
    var d=await res.json();
    var pct=fixScore(d.score),sc=scoreStyle(pct);
    var label=pct===null?'Pending':pct>=75?'Shortlisted 🎉':pct>=50?'Under Review':'Not Qualified';
    var reason=(d.reason||'').split('. ').slice(0,2).join('. ');
    // Save to my applications
    var apps=JSON.parse(localStorage.getItem('hunters_portal_apps')||'[]');
    apps.unshift({job_title:currentJob.job_title,company_name:currentJob.company_name||'',job_id:currentJob.id,candidate_id:d.candidate_id,applied_date:new Date().toISOString(),score:pct,decision:label,status:'Screened'});
    localStorage.setItem('hunters_portal_apps',JSON.stringify(apps.slice(0,50)));
    if(d.name||d.email){
      var pr=JSON.parse(localStorage.getItem('hunters_candidate_profile')||'{}');
      if(d.name&&!d.name.includes('@'))pr.name=d.name;
      if(d.email)pr.email=d.email;if(d.phone)pr.phone=d.phone;
      localStorage.setItem('hunters_candidate_profile',JSON.stringify(pr));
    }
    form.innerHTML='<div style="text-align:center;padding:20px;">' +
      '<div style="width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:500;margin:0 auto 12px;border:3px solid '+sc.tx+';color:'+sc.tx+';background:'+sc.bg+';">'+(pct!==null?pct+'%':'—')+'</div>' +
      '<div style="display:inline-flex;padding:4px 16px;border-radius:20px;font-size:13px;font-weight:500;margin-bottom:14px;background:'+sc.bg+';color:'+sc.tx+';">'+esc(label)+'</div>' +
      (reason?'<p style="font-size:13px;color:#6B7280;line-height:1.6;margin-bottom:16px;">'+esc(reason)+'</p>':'')+
      '<div style="display:flex;gap:8px;">' +
        '<button onclick="showPortalSection(\'my-applications\');closeOverlay();" style="flex:1;background:#1B2A4A;color:#fff;border:none;border-radius:8px;padding:10px;font-size:12px;cursor:pointer;font-weight:500;">My Applications</button>' +
        '<button onclick="showPortalSection(\'cv-writer\');closeOverlay();" style="flex:1;background:#C9A84C;color:#1B2A4A;border:none;border-radius:8px;padding:10px;font-size:12px;font-weight:500;cursor:pointer;">✨ Improve CV</button>' +
      '</div></div>';
  }catch(err){clearInterval(iv);
    form.innerHTML='<div style="text-align:center;padding:20px;"><div style="color:#A32D2D;font-size:13px;margin-bottom:12px;">⚠ '+esc(err.message)+'</div>' +
      '<button onclick="document.getElementById(\'apply-panel\').innerHTML=applyPanelHtml();_applyFile=null;" style="background:#1B2A4A;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:12px;cursor:pointer;">Try Again</button></div>';
  }
}

function closeOverlay(){document.getElementById('job-overlay').classList.remove('active');_applyFile=null;currentJob=null;}

function field(label,id,type,val,ph){return'<div><label style="font-size:11px;font-weight:500;color:#6B7280;display:block;margin-bottom:5px;">'+label+'</label><input id="'+id+'" type="'+type+'" value="'+esc(val)+'" placeholder="'+esc(ph)+'" style="width:100%;padding:10px 12px;border:1px solid #E5E7EB;border-radius:8px;font-size:13px;color:#1B2A4A;outline:none;"></div>';}

function renderSkillTags(){return _profileSkills.map(function(s,i){return'<span style="display:inline-flex;align-items:center;gap:6px;background:#F0F2F8;color:#1B2A4A;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;">'+esc(s)+'<button onclick="removeSkill('+i+')" style="color:#CC2B2B;background:none;border:none;cursor:pointer;font-size:14px;line-height:1;padding:0;">&times;</button></span>';}).join('');}

function renderExpList(){if(!_profileExps.length)return'<div style="font-size:12px;color:#9CA3AF;padding:6px 0;">No experience added</div>';return _profileExps.map(function(e,i){return'<div style="background:#F5F6F8;border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;"><div><div style="font-size:13px;font-weight:500;color:#1B2A4A;">'+esc(e.title||'—')+'</div><div style="font-size:12px;color:#6B7280;">'+esc(e.company||'')+(e.duration?' · '+esc(e.duration):'')+'</div></div><button onclick="removeExp('+i+')" style="color:#CC2B2B;background:none;border:none;cursor:pointer;font-size:18px;line-height:1;">&times;</button></div>';}).join('');}

function addSkill(){var el=document.getElementById('new-skill');if(!el||!el.value.trim())return;_profileSkills.push(el.value.trim());el.value='';document.getElementById('skill-tags').innerHTML=renderSkillTags();}
function removeSkill(i){_profileSkills.splice(i,1);document.getElementById('skill-tags').innerHTML=renderSkillTags();}
function addExp(){var t=prompt('Job Title:');if(!t)return;var c=prompt('Company/Employer:')||'';var d=prompt('Duration (e.g. 2 years):')||'';_profileExps.push({title:t,company:c,duration:d});document.getElementById('exp-list').innerHTML=renderExpList();}
function removeExp(i){_profileExps.splice(i,1);document.getElementById('exp-list').innerHTML=renderExpList();}

function saveProfile(){
  var pr={name:(document.getElementById('profile-name')||{}).value||'',phone:(document.getElementById('profile-phone')||{}).value||'',email:(document.getElementById('profile-email')||{}).value||'',industry:(document.getElementById('profile-industry')||{}).value||'',skills:_profileSkills,experiences:_profileExps};
  localStorage.setItem('hunters_candidate_profile',JSON.stringify(pr));
  showToast('Profile saved!','success');
}

        ['Professional format tailored to your experience','ATS-optimized keywords from your industry','Hunters branded design','Download as PDF instantly'].map(function(f){return'<li style="font-size:12px;color:#1B2A4A;padding:6px 0;border-bottom:0.5px solid #F3F4F6;display:flex;align-items:center;gap:8px;"><span style="color:#0F6E56;">✓</span>'+f+'</li>';}).join('')+
      '</ul>' +
      '<button onclick="payAndGenerate()" style="width:100%;background:#C9A84C;color:#1B2A4A;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:500;cursor:pointer;">Pay 50 EGP &amp; Generate My CV</button>' +
      '<div style="font-size:11px;color:#9CA3AF;margin-top:10px;">Payment placeholder — real gateway coming soon</div>' +
    '</div>';
  } else {
    el.innerHTML='<div style="max-width:700px;margin:0 auto;">' +

function payAndGenerate(){localStorage.setItem('hunters_cv_paid','true');showToast('Payment confirmed! Generating your CV…','success');renderCVWriter();setTimeout(generateCV,400);}

async function generateCV(){
  var pr=JSON.parse(localStorage.getItem('hunters_candidate_profile')||'{}');
  if(!pr.name&&portalUser)pr.name=portalUser.full_name||'';
  if(!pr.email&&portalUser)pr.email=portalUser.email||'';
  var st=document.getElementById('cv-status'),pw=document.getElementById('cv-preview-wrap');
  if(!st)return;
  st.style.display='block';if(pw)pw.style.display='none';
  var steps=['Reading your profile…','Crafting your CV…','Adding finishing touches…'],si=0;
  st.innerHTML='<div id="gen-step" style="font-size:13px;color:#6B7280;margin-bottom:12px;">'+steps[0]+'</div><div style="height:4px;background:#F0F1F5;border-radius:2px;overflow:hidden;"><div id="gen-bar" style="height:100%;width:8%;background:#C9A84C;border-radius:2px;transition:width 0.5s;"></div></div>';
  var iv=setInterval(function(){si=Math.min(si+1,steps.length-1);var s=document.getElementById('gen-step'),b=document.getElementById('gen-bar');if(s)s.textContent=steps[si];if(b)b.style.width=((si+1)/steps.length*80)+'%';},1600);
  try{
    var r=await fetch('/api/ai/generate-cv',{method:'POST',headers:Object.assign({},hdrs(),{'Content-Type':'application/json'}),body:JSON.stringify({name:pr.name||'Candidate',email:pr.email||'',phone:pr.phone||'',experiences:pr.experiences||[],skills:pr.skills||[],education:pr.education||'',industry:pr.industry||''})});
    clearInterval(iv);if(!r.ok)throw new Error('CV generation failed');
    _cvData=await r.json();st.style.display='none';renderCVPreview(_cvData);
  }catch(err){clearInterval(iv);st.innerHTML='<div style="color:#A32D2D;font-size:13px;">Failed: '+esc(err.message)+'</div><button onclick="generateCV()" style="margin-top:10px;background:#1B2A4A;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;">Retry</button>';}
}

function renderCVPreview(cv){
  var pw=document.getElementById('cv-preview-wrap');if(!pw)return;
  pw.style.display='block';
  var i=ini(cv.name||'?');
  pw.innerHTML=
    '<div id="cv-preview" style="max-width:700px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.12);">' +
      '<div style="background:#1B2A4A;padding:32px;color:#fff;">' +
        '<div style="display:flex;align-items:center;gap:20px;">' +
          '<div style="width:72px;height:72px;border-radius:50%;background:#C9A84C;color:#1B2A4A;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:500;flex-shrink:0;">'+i+'</div>' +
          '<div><div style="font-size:24px;font-weight:500;">'+esc(cv.name||'')+'</div>' +
            '<div style="color:#C9A84C;font-size:14px;margin-top:4px;">'+esc(cv.headline||'')+'</div>' +
            '<div style="color:rgba(255,255,255,0.6);font-size:12px;margin-top:6px;">'+esc(cv.email||'')+(cv.phone?' · '+esc(cv.phone):'')+'</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div style="padding:28px 32px;">' +
        (cv.summary?'<div style="margin-bottom:24px;"><div style="font-size:13px;font-weight:500;color:#C9A84C;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #C9A84C;">Professional Summary</div><p style="font-size:13px;color:#1B2A4A;line-height:1.7;">'+esc(cv.summary)+'</p></div>':'')+
        (cv.experience&&cv.experience.length?'<div style="margin-bottom:24px;"><div style="font-size:13px;font-weight:500;color:#C9A84C;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #C9A84C;">Work Experience</div>'+cv.experience.map(function(e){return'<div style="margin-bottom:16px;"><div style="display:flex;justify-content:space-between;align-items:baseline;"><div style="font-size:14px;font-weight:500;color:#1B2A4A;">'+esc(e.title||'')+'</div><div style="font-size:11px;color:#9CA3AF;">'+esc(e.duration||'')+'</div></div><div style="font-size:12px;color:#C9A84C;margin-bottom:6px;">'+esc(e.company||'')+'</div>'+(e.achievements&&e.achievements.length?'<ul style="padding-left:16px;">'+e.achievements.map(function(a){return'<li style="font-size:12px;color:#374151;line-height:1.6;margin-bottom:3px;">'+esc(a)+'</li>';}).join('')+'</ul>':'')+'</div>';}).join('')+'</div>':'')+
        (cv.skills&&cv.skills.length?'<div style="margin-bottom:24px;"><div style="font-size:13px;font-weight:500;color:#C9A84C;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #C9A84C;">Skills</div><div style="display:flex;flex-wrap:wrap;gap:8px;">'+cv.skills.map(function(s){return'<span style="background:#F0F2F8;color:#1B2A4A;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;">'+esc(s)+'</span>';}).join('')+'</div></div>':'')+
        (cv.education?'<div style="margin-bottom:24px;"><div style="font-size:13px;font-weight:500;color:#C9A84C;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #C9A84C;">Education</div><div style="font-size:13px;color:#374151;line-height:1.6;">'+esc(cv.education)+'</div></div>':'')+
        (cv.languages&&cv.languages.length?'<div style="margin-bottom:16px;"><div style="font-size:13px;font-weight:500;color:#C9A84C;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #C9A84C;">Languages</div><div style="display:flex;flex-wrap:wrap;gap:8px;">'+cv.languages.map(function(l){return'<span style="background:#F0F2F8;color:#1B2A4A;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;">'+esc(l)+'</span>';}).join('')+'</div></div>':'')+
      '</div>' +
      '<div style="background:#F5F6F8;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;">' +
        '<img src="hunters-logo-blue.jpeg" alt="Hunters" style="height:28px;width:auto;" onerror="this.outerHTML=\'<span style=font-size:11px;color:#9CA3AF;font-weight:500;>HUNTERS FOR HR</span>\'">' +
        '<span style="font-size:11px;color:#9CA3AF;">Generated by Hunters AI</span>' +
      '</div>' +
    '</div>' +
    '<div style="text-align:center;margin-top:20px;display:flex;gap:10px;justify-content:center;padding-bottom:20px;">' +
      '<button onclick="downloadCV()" style="background:#1B2A4A;color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:13px;font-weight:500;cursor:pointer;">⬇ Download PDF</button>' +
      '<button onclick="generateCV()" style="background:#fff;border:0.5px solid #E5E7EB;border-radius:8px;padding:12px 24px;font-size:13px;color:#6B7280;cursor:pointer;">↺ Regenerate</button>' +
    '</div>';
}

function downloadCV(){
  var cv=_cvData||{};var el=document.getElementById('cv-preview');
  if(!el){showToast('Generate your CV first','error');return;}
  var w=window.open('','_blank');
  w.document.write('<html><head><title>CV - '+esc(cv.name||'CV')+'</title><style>body{margin:0;font-family:"Segoe UI",Arial,sans-serif;}@media print{body{margin:0;}}</style></head><body>'+el.outerHTML+'</body></html>');
  w.document.close();w.print();
}
