<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Your Company - Hunters for HR Solutions</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .register-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #6B6BB5 0%, #5A4A9E 50%, #7B4F9E 100%);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .register-overlay.active {
            display: flex;
        }

        .register-card {
            background: white;
            border-radius: 16px;
            padding: 40px 36px;
            max-width: 560px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            max-height: 90vh;
            overflow-y: auto;
        }

        .register-card .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-card .logo i {
            font-size: 48px;
            color: var(--gold);
            margin-bottom: 10px;
            display: block;
        }

        .register-card h2 {
            margin: 10px 0 5px 0;
            font-size: 24px;
            color: #333;
        }

        .register-card h2 span {
            color: var(--gold);
            font-size: 14px;
            display: block;
            font-weight: 400;
        }

        .register-card > p {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .register-form {
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 11px 14px;
            border: 0.5px solid #E5E7EB;
            border-radius: 8px;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 13px;
            color: #1B2A4A;
            background: #FFFFFF;
            transition: border-color 0.15s;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1B2A4A;
            background: #FAFBFF;
            box-shadow: none;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .btn-primary {
            background: #1B2A4A;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.15s;
        }

        .btn-primary:hover { opacity: 0.85; }
        .btn-primary:active { transform: scale(0.98); }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .form-footer {
            margin-top: 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .form-footer a {
            color: #C9A84C;
            text-decoration: none;
            font-weight: 500;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #E1F5EE;
            color: #0F6E56;
            border: 0.5px solid #9FE1CB;
        }

        .alert-error {
            background: #FCEBEB;
            color: #A32D2D;
            border: 0.5px solid #F5B8B8;
        }

        .alert-info {
            background: #E6F1FB;
            color: #185FA5;
            border: 0.5px solid #B5D4F4;
        }

        .form-group-note {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <!-- Company Registration Screen -->
    <div id="register-overlay" class="register-overlay active">
        <div class="register-card">
            <div class="logo">
                <img src="hunters-logo-blue.jpeg" alt="Hunters for HR Transformation &amp; Execution" style="height:64px;width:auto;object-fit:contain;display:block;margin:0 auto;">
                <h2>Register Your Company<br><span>Hunters for HR Solutions</span></h2>
            </div>
            <p>Join our AI-powered recruitment platform</p>
            
            <div id="registration-alert" class="alert"></div>

            <form id="registration-form" class="register-form" onsubmit="handleCompanyRegistration(event)">
                <!-- Company Information -->
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="company-name" placeholder="Your Company Name" required>
                </div>

                <div class="form-group">
                    <label>Company Email</label>
                    <input type="email" id="company-email" placeholder="company@example.com" required>
                    <div class="form-group-note">This will be used as the admin account email</div>
                </div>

                <div class="form-group">
                    <label>Company Website</label>
                    <input type="url" id="company-website" placeholder="https://example.com" required>
                </div>

                <div class="form-group">
                    <label>Registration Number</label>
                    <input type="text" id="company-registration" placeholder="e.g., 12345678" required>
                    <div class="form-group-note">Tax ID, Business Registration, or Legal Entity Number</div>
                </div>

                <!-- Contact Person Information -->
                <hr style="border: none; border-top: 2px solid #e0e0e0; margin: 25px 0;">
                
                <div class="form-group">
                    <label style="font-weight: 500; color: #C9A84C;">Contact Person</label>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="contact-person" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="contact-email" placeholder="john@company.com" required>
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label>Password</label>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="password" id="company-password" placeholder="••••••••" required style="flex: 1;">
                        <button type="button" onclick="togglePasswordVisibility()" style="background: none; border: none; cursor: pointer; color: #C9A84C; font-size: 20px;">
                            <i class='bx bx-show' id="password-toggle-icon"></i>
                        </button>
                    </div>
                    <div class="form-group-note">Minimum 6 characters. Use a strong password.</div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-primary" style="margin-top: 25px;">
                    Submit Registration
                </button>

                <div class="form-footer">
                    Already have an account? <a href="index.html">Login here</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        async function handleCompanyRegistration(event) {
            event.preventDefault();

            const companyName = document.getElementById('company-name').value;
            const companyEmail = document.getElementById('company-email').value;
            const companyWebsite = document.getElementById('company-website').value;
            const companyRegistration = document.getElementById('company-registration').value;
            const contactPerson = document.getElementById('contact-person').value;
            const contactEmail = document.getElementById('contact-email').value;
            const companyPassword = document.getElementById('company-password').value;

            if (companyPassword.length < 6) {
                showAlert('Password must be at least 6 characters long', 'error');
                return;
            }

            const submitBtn = event.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            try {
                const response = await fetch(`${API_URL}/companies/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        company_name: companyName,
                        company_email: companyEmail,
                        company_website: companyWebsite,
                        registration_number: companyRegistration,
                        contact_person: contactPerson,
                        contact_email: contactEmail,
                        password: companyPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('✓ Registration submitted successfully! Please wait for admin approval. Check your email for updates.', 'success');
                    document.getElementById('registration-form').reset();
                    
                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                } else {
                    showAlert(`Registration failed: ${data.detail || 'Please try again'}`, 'error');
                }
            } catch (error) {
                showAlert(`Error: ${error.message}`, 'error');
                console.error('Registration error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Registration';
            }
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('company-password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('bx-show');
                toggleIcon.classList.add('bx-hide');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('bx-hide');
                toggleIcon.classList.add('bx-show');
            }
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('registration-alert');
            alertDiv.textContent = message;
            alertDiv.className = `alert show alert-${type}`;
            
            if (type !== 'error') {
                setTimeout(() => {
                    alertDiv.classList.remove('show');
                }, 5000);
            }
        }
    </script>
</body>
</html>
