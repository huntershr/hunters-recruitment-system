<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CACHE VERSION: v1.01 -->
    <meta name="robots" content="index, follow">
    <title>Job Openings | Hunters for HR Solutions</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1B2A4A;
            --navy: #1B2A4A;
            --gold: #C9A84C;
            --bg: #F4F5FA;
            --white: #ffffff;
            --text: #1B2A4A;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }

        .header {
            background: var(--white);
            padding: 20px 40px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--navy); }
        .logo h1 { font-size: 20px; font-weight: 500; letter-spacing: 0.5px; line-height: 1.1; }
        .logo span { font-size: 9px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }

        .hero {
            padding: 80px 20px;
            text-align: center;
            background: linear-gradient(180deg, #1B2A4A 0%, #2C3E6B 100%);
            color: white;
        }
        .hero h2 { font-size: 42px; margin-bottom: 10px; font-weight: 500; }
        .hero p { opacity: 0.95; font-size: 18px; max-width: 600px; margin: 0 auto; font-weight: 400; }
        .hero p strong { color: var(--gold); font-weight: 500; }

        .container { max-width: 1200px; margin: -50px auto 80px; padding: 0 20px; }

        .jobs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .job-card {
            background: var(--white);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 0.5px solid rgba(0,0,0,0.06);
        }

        .job-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .job-card h3 { font-size: 22px; color: var(--navy); margin-bottom: 4px; }
        .job-company-name { color: #1B2A4A; font-size: 0.85rem; font-weight: 400; margin: 2px 0 12px 0; opacity: 0.65; }
        
        .meta-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .tag {
            padding: 6px 12px;
            background: #f1f5f9;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .tag i { font-size: 14px; color: var(--gold); }

        .description {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-apply {
            margin-top: auto;
            background: var(--navy);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            transition: opacity 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-apply:hover { opacity: 0.85; }
        .btn-apply:active { transform: scale(0.98); }

        .loader { text-align: center; padding: 50px; font-size: 18px; color: var(--text-muted); }
    </style>
</head>
<body>
    <header class="header">
        <a href="#" class="logo">
            <img src="hunters-logo-white.jpeg" alt="Hunters for HR Transformation &amp; Execution" style="height:64px;width:auto;object-fit:contain;display:block;margin:0 auto;">
        </a>
    </header>

    <div class="hero">
        <h2>Explore Current Openings</h2>
        <p>Start your journey with <strong>Hunters - AI Recruitment System</strong></p>
    </div>

    <div class="container">
        <div id="jobs-list" class="jobs-grid">
            <div class="loader">Loading active openings...</div>
        </div>
    </div>

    <script>
        async function loadJobs() {
            try {
                const response = await fetch('/public/jobs');
                const jobs = await response.json();
                const container = document.getElementById('jobs-list');
                
                if (jobs.length === 0) {
                    container.innerHTML = '<div class="loader">No active openings at the moment. Check back later!</div>';
                    return;
                }

                container.innerHTML = '';
                jobs.forEach(job => {
                    container.innerHTML += `
                        <div class="job-card">
                            <h3>${job.job_title}</h3>
                            ${job.company_name ? `<p class="job-company-name">${job.company_name}</p>` : ''}
                            <div class="meta-tags">
                                <div class="tag"><i class='bx bx-map'></i> ${job.job_location || 'Location TBD'}</div>
                                <div class="tag"><i class='bx bx-time'></i> ${job.min_experience}+ yrs</div>
                                <div class="tag"><i class='bx bx-book'></i> ${job.education_level}</div>
                                <div class="tag"><i class='bx bx-money'></i> ${job.salary_range || 'Competitive'}</div>
                            </div>
                            <div class="description">${job.job_description || 'Click apply to view full details and requirements for this role.'}</div>
                            <a href="/apply.html?job_id=${job.id}" class="btn-apply">
                                Apply Now <i class='bx bx-right-arrow-alt'></i>
                            </a>
                        </div>
                    `;
                });
                // ── Part 2: JSON-LD structured data for all jobs (Google Jobs / Indeed) ──
                function _removeNulls(obj) {
                    if (Array.isArray(obj)) return obj.map(_removeNulls).filter(v => v != null);
                    if (obj !== null && typeof obj === 'object') {
                        return Object.fromEntries(
                            Object.entries(obj)
                                .filter(([, v]) => v != null)
                                .map(([k, v]) => [k, _removeNulls(v)])
                        );
                    }
                    return obj;
                }
                const today = new Date().toISOString().split('T')[0];
                const ldArray = jobs.map(job => _removeNulls({
                    '@context': 'https://schema.org/',
                    '@type': 'JobPosting',
                    'title': job.job_title,
                    'description': job.job_description || null,
                    'hiringOrganization': {
                        '@type': 'Organization',
                        'name': job.company_name || 'Hunters for HR Transformation & Execution',
                        'sameAs': 'https://hunters-egypt.com'
                    },
                    'jobLocation': {
                        '@type': 'Place',
                        'address': {
                            '@type': 'PostalAddress',
                            'addressLocality': job.job_location || 'Cairo',
                            'addressCountry': 'EG'
                        }
                    },
                    'datePosted': job.created_at ? job.created_at.split('T')[0] : today,
                    'validThrough': job.expiry_date || null,
                    'employmentType': job.job_type === 'full-time' ? 'FULL_TIME'
                                    : job.job_type === 'part-time' ? 'PART_TIME'
                                    : job.job_type === 'contract'  ? 'CONTRACTOR'
                                    : 'FULL_TIME',
                    'baseSalary': job.salary_range ? {
                        '@type': 'MonetaryAmount',
                        'currency': 'EGP',
                        'value': { '@type': 'QuantitativeValue', 'value': job.salary_range, 'unitText': 'MONTH' }
                    } : null,
                    'educationRequirements': job.education_level || null,
                    'experienceRequirements': job.min_experience ? job.min_experience + '+ years experience' : null,
                    'skills': job.required_skills || null,
                    'identifier': { '@type': 'PropertyValue', 'name': 'Hunters HR', 'value': job.id },
                    'url': 'https://app.hunters-egypt.com/apply.html?job_id=' + job.id
                }));
                let ldTag = document.querySelector('script[type="application/ld+json"]');
                if (!ldTag) {
                    ldTag = document.createElement('script');
                    ldTag.type = 'application/ld+json';
                    document.head.appendChild(ldTag);
                }
                ldTag.textContent = JSON.stringify(ldArray, null, 2);

            } catch (err) {
                document.getElementById('jobs-list').innerHTML = '<div class="loader">Failed to load jobs. Please refresh the page.</div>';
            }
        }

        loadJobs();
    </script>
</body>
</html>
