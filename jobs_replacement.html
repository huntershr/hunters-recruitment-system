    <!-- ── Jobs ── -->
    <div id="jobs" class="content-area">
        <!-- A1 Page Header -->
        <div style="background:#FFFFFF; border-radius:16px; border-left:4px solid #1B2A4A; padding:24px 32px; box-shadow:0 2px 12px rgba(0,0,0,0.06); display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <svg width="18" height="18" fill="#C9A84C" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2" fill="none" stroke="#C9A84C" stroke-width="2"/></svg>
                    <h1 style="font-size:22px; font-weight:500; color:#1B2A4A; margin:0;">My Jobs</h1>
                </div>
                <p style="font-size:13px; color:#9CA3AF; margin:4px 0 0 0;">Manage and track your job postings</p>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
                <!-- A3 Toggle -->
                <div style="display:flex; border:0.5px solid #E5E7EB; border-radius:8px; overflow:hidden;">
                    <button id="card-view-btn" onclick="huntersToggleJobView('card')" style="padding:7px 12px; font-size:12px; border:none; cursor:pointer; background:#1B2A4A; color:#FFFFFF; display:flex; align-items:center; gap:5px;">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Cards
                    </button>
                    <button id="list-view-btn" onclick="huntersToggleJobView('list')" style="padding:7px 12px; font-size:12px; border:none; cursor:pointer; background:#FFFFFF; color:#6B7280; display:flex; align-items:center; gap:5px;">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> List
                    </button>
                </div>
                <!-- Post New Job -->
                <button onclick="openNewJobModal()" style="background:#1B2A4A; color:#FFFFFF; border:none; border-radius:10px; padding:10px 18px; font-size:13px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:6px; transition:opacity 0.2s;">
                    <svg width="14" height="14" stroke="#C9A84C" stroke-width="3" fill="none" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Post New Job
                </button>
            </div>
        </div>

        <!-- A2 Filter Toolbar -->
        <div style="display:flex; gap:10px; margin-bottom:16px;">
            <div style="flex:1; position:relative;">
                <svg width="14" height="14" fill="none" stroke="#9CA3AF" stroke-width="2" viewBox="0 0 24 24" style="position:absolute; left:12px; top:10px;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="job-search-input" oninput="renderHuntersJobs()" placeholder="Search jobs by title, location…" style="width:100%; background:#FFFFFF; border:1px solid #E5E7EB; border-radius:8px; padding:8px 12px 8px 32px; font-size:12px; font-family:'Segoe UI', Arial, sans-serif;">
            </div>
            <select id="job-status-filter" onchange="renderHuntersJobs()" style="background:#FFFFFF; border:1px solid #E5E7EB; border-radius:8px; padding:8px 12px; font-size:12px; font-family:'Segoe UI', Arial, sans-serif; cursor:pointer;">
                <option value="">All Status</option>
                <option value="Approved">Approved</option>
                <option value="Pending">Pending</option>
                <option value="Rejected">Rejected</option>
            </select>
            <select id="job-type-filter" onchange="renderHuntersJobs()" style="background:#FFFFFF; border:1px solid #E5E7EB; border-radius:8px; padding:8px 12px; font-size:12px; font-family:'Segoe UI', Arial, sans-serif; cursor:pointer;">
                <option value="">All Types</option>
                <option value="Full-time">Full-time</option>
                <option value="Part-time">Part-time</option>
                <option value="Contract">Contract</option>
                <option value="Freelance">Freelance</option>
            </select>
            <input type="text" id="job-loc-filter" oninput="renderHuntersJobs()" placeholder="Filter by location…" style="background:#FFFFFF; border:1px solid #E5E7EB; border-radius:8px; padding:8px 12px; font-size:12px; font-family:'Segoe UI', Arial, sans-serif; width:160px;">
        </div>

        <!-- A4 CARD VIEW CONTAINER -->
        <div id="jobs-card-view" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:16px;"></div>

        <!-- A5 LIST VIEW CONTAINER -->
        <div id="jobs-list-view" style="display:none; background:#FFFFFF; border-radius:16px; border:0.5px solid rgba(0,0,0,0.06); box-shadow:0 2px 12px rgba(0,0,0,0.06); overflow:hidden;">
            <div style="overflow-x:auto;">
                <table style="width:100%; border-collapse:collapse; text-align:left;">
                    <thead style="background:#1B2A4A; color:#FFFFFF;">
                        <tr>
                            <th style="padding:10px 14px; font-size:11px; font-weight:500;">Job Title</th>
                            <th style="padding:10px 14px; font-size:11px; font-weight:500;">Company</th>
                            <th style="padding:10px 14px; font-size:11px; font-weight:500;">Location</th>
                            <th style="padding:10px 14px; font-size:11px; font-weight:500;">Type</th>
                            <th style="padding:10px 14px; font-size:11px; font-weight:500;">Salary</th>
                            <th style="padding:10px 14px; font-size:11px; font-weight:500;">Status</th>
                            <th style="padding:10px 14px; font-size:11px; font-weight:500;">AI Score</th>
                            <th style="padding:10px 14px; font-size:11px; font-weight:500;">Applications</th>
                            <th style="padding:10px 14px; font-size:11px; font-weight:500;">Posted</th>
                            <th style="padding:10px 14px; font-size:11px; font-weight:500;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="jobs-list-tbody"></tbody>
                </table>
            </div>
        </div>

        <!-- A7 EMPTY STATE -->
        <div id="jobs-empty-state" style="display:none; text-align:center; padding:48px; background:#FFFFFF; border-radius:16px; border:0.5px solid rgba(0,0,0,0.06); box-shadow:0 2px 12px rgba(0,0,0,0.06); margin-top:16px;">
            <svg width="44" height="44" fill="none" stroke="#D1D5DB" stroke-width="1.5" viewBox="0 0 24 24" style="margin:0 auto;"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
            <div style="font-size:14px; font-weight:500; color:#1B2A4A; margin-top:12px;">No jobs found</div>
            <div style="font-size:12px; color:#9CA3AF; margin-top:4px;">Try adjusting your filters or post a new job</div>
            <button onclick="openNewJobModal()" style="background:#1B2A4A; color:#FFFFFF; border:none; border-radius:8px; padding:8px 16px; font-size:12px; font-weight:500; cursor:pointer; margin-top:16px; transition:opacity 0.2s;">+ Post New Job</button>
        </div>
    </div>
